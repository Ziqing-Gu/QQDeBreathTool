name: Build macOS Apple Silicon

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "debreath_tool_app.py"
      - "breath_frame_model.joblib"
      - "QQDeBreathTool.spec"
      - "requirements-qqdebreath.txt"
      - ".github/workflows/macos-arm64.yaml"

jobs:
  bundle-app:
    runs-on: macos-15
    steps:
      - name: Checkout source
        uses: actions/checkout@v7

      - name: Verify runner architecture
        run: |
          uname -m
          test "$(uname -m)" = "arm64"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          architecture: arm64
          cache: pip
          cache-dependency-path: requirements-qqdebreath.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-qqdebreath.txt

      - name: Build app
        run: python -m PyInstaller --noconfirm --clean QQDeBreathTool.spec

      - name: Ad-hoc sign and create DMG
        run: |
          codesign --force --deep --sign - dist/QQDeBreathTool.app
          mkdir dmg_structure
          mv dist/QQDeBreathTool.app dmg_structure/
          ln -s /Applications dmg_structure/Applications
          hdiutil create -volname "QQDeBreathTool 1.11 Apple Silicon" -srcfolder dmg_structure -ov -format UDZO QQDeBreathTool-1.11-macOS-Apple-Silicon.dmg
          file dmg_structure/QQDeBreathTool.app/Contents/MacOS/QQDeBreathTool > QQDeBreathTool-Apple-Silicon-architecture.txt

      - name: Upload Apple Silicon DMG
        uses: actions/upload-artifact@v7
        with:
          name: QQDeBreathTool-1.11-macOS-Apple-Silicon
          path: |
            QQDeBreathTool-1.11-macOS-Apple-Silicon.dmg
            QQDeBreathTool-Apple-Silicon-architecture.txt
          if-no-files-found: error